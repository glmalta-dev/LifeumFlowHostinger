            min-height: 100vh;

            -webkit-backdrop-filter: blur(20px);

<body class="text-text-primary font-body antialiased selection:bg-primary-container selection:text-white flex flex-col mx-auto max-w-[390px] relative h-[844px] overflow-hidden bg-background">
<!-- Modal Header -->
<header class="bg-surface-glass backdrop-blur-xl sticky top-0 z-50 flex items-center justify-between px-4 h-14 border-b border-outline-variant/30">
  <div class="flex items-center gap-3">
    <button aria-label="Voltar" class="w-10 h-10 flex items-center justify-center text-on-surface-variant hover:bg-surface-container-high/50 rounded-full transition-colors">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
    </button>
    <div class="flex flex-col">
      <h1 class="font-section-title text-section-title text-text-primary leading-tight">Novo Agendamento</h1>
      <p class="font-caption text-caption text-text-secondary">Ana Silva</p>
    </div>
  </div>
  <button class="text-primary font-body-strong px-4 h-10 flex items-center justify-center hover:bg-primary-container/10 rounded-lg transition-colors">
    Salvar
  </button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto px-screen-horizontal pt-4 pb-32 space-y-5">
<!-- Patient Summary Snippet -->
<div class="glass-panel rounded-xl p-compact-card-padding flex items-center gap-3">
<img alt="Ana Silva" class="w-10 h-10 rounded-full object-cover shadow-sm" data-alt="A professional, well-lit studio portrait of a 32-year-old woman smiling gently. She has medium-length brown hair and is wearing a light, neutral-colored blouse. The lighting is soft and flattering, creating a clean, modern aesthetic suitable for a medical or dental clinic app profile picture. High quality, realistic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDq1qxede1gJZC0j-2_arQ3EltsXKkoPCOsOzPS-i1SO3Pv_xcfXCeslvG2Xoblq8wxnXxkAvQkirGQU1L-z5fOUraSaiDA7NY-4xKAzc5FeekA4SI6AdcfDZ99J1hzpG0r3wdLvgj1joPk6pWhIOK-ILYgScBGLlR_Nu0Tm4lj66m14jmCn1CsL748GGBfBp8lAtFaY80-7U1l4B3GP9Cqq7goUxiy0t_QEX5g9SU8ADzoUqGLGsjmNw">
<div>
<h2 class="font-body-strong text-body-strong text-text-primary">Ana Silva</h2>
<p class="font-caption text-caption text-text-secondary">Paciente • 32 anos</p>
</div>
</div>
<!-- Form Section -->
<form class="space-y-section-gap">
<!-- Procedure -->
<div class="space-y-1">
<label class="font-label text-label text-on-surface-variant ml-1 block" for="procedure">Procedimento</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" style="font-size: 20px;">medical_services</span>
<select class="input-soft w-full h-12 rounded-xl pl-10 pr-4 font-body text-text-primary appearance-none cursor-pointer" id="procedure">
<option disabled="" selected="" value="">Selecione o procedimento...</option>
<option value="restauracao">Restauração em Resina</option>
<option value="limpeza">Profilaxia (Limpeza)</option>
<option value="avaliacao">Avaliação Clínica</option>
<option value="clareamento">Clareamento Dental</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none" style="font-size: 20px;">expand_more</span>
</div>
</div>
<!-- Professional -->
<div class="space-y-1">
<label class="font-label text-label text-on-surface-variant ml-1 block" for="professional">Profissional</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" style="font-size: 20px;">person</span>
<select class="input-soft w-full h-12 rounded-xl pl-10 pr-4 font-body text-text-primary appearance-none cursor-pointer" id="professional">
<option disabled="" selected="" value="">Selecione o dentista...</option>
<option value="camila">Dra. Camila</option>
<option value="gabriel">Dr. Gabriel</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none" style="font-size: 20px;">expand_more</span>
</div>
</div>
<!-- Date & Time Grid -->
<div class="grid grid-cols-2 gap-3">
<div class="space-y-1">
<label class="font-label text-label text-on-surface-variant ml-1 block" for="date">Data</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" style="font-size: 20px;">calendar_today</span>
<input class="input-soft w-full h-12 rounded-xl pl-10 pr-3 font-body text-text-primary" id="date" type="date">
</div>
</div>
<div class="space-y-1">
<label class="font-label text-label text-on-surface-variant ml-1 flex justify-between" for="time">
<span class="">Horário</span>
<a class="text-primary font-label text-label hover:underline" href="#">Ver agenda</a>
</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" style="font-size: 20px;">schedule</span>
<input class="input-soft w-full h-12 rounded-xl pl-10 pr-3 font-body text-text-primary" id="time" type="time">
</div>
</div>
</div>
<!-- Duration & Room Grid -->
<div class="grid grid-cols-2 gap-3">
<div class="space-y-1">
<label class="font-label text-label text-on-surface-variant ml-1 block" for="duration">Duração</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" style="font-size: 20px;">timer</span>
<select class="input-soft w-full h-12 rounded-xl pl-10 pr-8 font-body text-text-primary appearance-none cursor-pointer" id="duration">
<option value="15">15 min</option>
<option selected="" value="30">30 min</option>
<option value="45">45 min</option>
<option value="60">1h</option>
<option value="90">1h 30min</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none" style="font-size: 20px;">expand_more</span>
</div>
</div>
<div class="space-y-1">
<label class="font-label text-label text-on-surface-variant ml-1 block" for="room">Sala</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" style="font-size: 20px;">meeting_room</span>
<select class="input-soft w-full h-12 rounded-xl pl-10 pr-8 font-body text-text-primary appearance-none cursor-pointer" id="room">
<option value="sala1">Sala 1</option>
<option value="sala2">Sala 2</option>
<option value="sala3">Sala 3</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none" style="font-size: 20px;">expand_more</span>
</div>
</div>
</div>
<!-- Notes -->
<div class="space-y-1">
<label class="font-label text-label text-on-surface-variant ml-1 block" for="notes">Observações <span class="text-outline font-normal">(opcional)</span></label>
<textarea class="input-soft w-full rounded-xl p-3 font-body text-text-primary resize-none" id="notes" placeholder="Detalhes adicionais para o agendamento..." rows="3"></textarea>
</div>
<!-- Recurrence Toggle -->
<div class="glass-panel rounded-xl p-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-outline" style="font-size: 24px;">repeat</span>
<div>
<p class="font-body-strong text-body-strong text-text-primary">Repetir agendamento</p>
<p class="font-caption text-caption text-text-secondary">Configurar recorrência semanal ou mensal</p>
</div>
</div>
<!-- Simple CSS Toggle -->
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value="">
<div class="w-11 h-6 bg-outline-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary-container"></div>
</label>
</div>
</form>
</main>
<!-- Fixed Bottom Actions -->
<nav class="glass-panel fixed bottom-0 left-0 w-full h-[72px] px-4 flex items-center justify-between z-50 border-t border-white/40 rounded-t-2xl">
  <button class="flex flex-col items-center justify-center gap-1 flex-1 text-text-secondary">
    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0, 'wght' 400;">calendar_today</span>
    <span class="text-[10px] font-medium">Hoje</span>
  </button>
  <button class="flex flex-col items-center justify-center gap-1 flex-1 text-primary">
    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1, 'wght' 400;">groups</span>
    <span class="text-[10px] font-medium">Pacientes</span>
  </button>
  <div class="flex-1 flex justify-center -translate-y-4">
    <button class="w-14 h-14 rounded-full bg-primary text-white shadow-lg flex items-center justify-center active:scale-95 transition-transform">
      <span class="material-symbols-outlined" style="font-size: 32px;">add_circle</span>
    </button>
  </div>
  <button class="flex flex-col items-center justify-center gap-1 flex-1 text-text-secondary">
    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0, 'wght' 400;">account_tree</span>
    <span class="text-[10px] font-medium">Fluxos</span>
  </button>
  <button class="flex flex-col items-center justify-center gap-1 flex-1 text-text-secondary">
    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0, 'wght' 400;">more_horiz</span>
    <span class="text-[10px] font-medium">Mais</span>
  </button>
</nav>




</body></html>
